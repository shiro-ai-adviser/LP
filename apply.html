<!doctype html>
<html lang="ja">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>無料お試しのお申込み — BUYMA出品ブースター</title>
<meta name="robots" content="noindex" />
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;800;900&family=Noto+Sans+JP:wght@400;500;700;900&display=swap" rel="stylesheet">
<link rel="stylesheet" href="styles.css" />
</head>
<body>
<header class="nav">
  <div class="wrap bar">
    <a class="logo" href="index.html">BUYMA<span> 出品ブースター</span></a>
    <nav class="links"><a href="index.html">← サービス紹介</a></nav>
  </div>
</header>

<section class="applysec">
  <div class="wrap" style="max-width:560px">
    <div class="center">
      <span class="eyebrow">無料お試しのお申込み</span>
      <h1 class="applytitle">全機能を、まずは無料で。</h1>
      <p class="sub">2週間 または 出品30件（早い方）まで無料。導入サポート面談つき・クレジットカード不要・自動課金なし。</p>
    </div>
    <div class="signupcard">
      <form class="signup" id="boosterSignup" method="post"
            action="https://script.google.com/macros/s/AKfycbz517VdLwffoybBXlAjb4laqNsiftM8fqXU91DnMhB_pZ1K_PYesz0Y9nOyfpJSHNP3ug/exec" target="boosterSink">
        <label class="req">お名前</label>
        <input type="text" name="name" required autocomplete="name" />
        <label class="req">メールアドレス</label>
        <input type="email" name="email" required autocomplete="email" placeholder="you@example.com" />
        <label>ショップ名 / BUYMAのURL（任意）</label>
        <input type="text" name="shop" autocomplete="off" />
        <button class="btn" id="submitBtn" type="submit" style="width:100%;margin-top:18px;justify-content:center">この内容で申し込む</button>
        <p class="note">お申込み後、導入サポート面談のご案内メールをお送りします（数分以内）。自動で課金されることはありません。</p>
      </form>
      <iframe name="boosterSink" style="display:none"></iframe>
    </div>
    <p class="center" style="margin-top:16px;font-size:12.5px">
      <a href="mailto:shiro.ai.adviser@gmail.com?subject=BUYMA出品ブースター 無料お試し" style="color:var(--accent-d);text-decoration:underline">うまく送れない場合は、メールでも受け付けます</a>
    </p>
  </div>
</section>

<footer>
  BUYMA出品ブースター（仮称）／ SHIRO<br>
  BUYMAは株式会社エニグモの商標です。本サービスはエニグモ社公認の公式サービスではない、独立した出品支援ツールです。
</footer>

<script>
(function () {
  var f = document.getElementById('boosterSignup');
  if (!f) return;
  var btn = document.getElementById('submitBtn');
  var sink = document.getElementsByName('boosterSink')[0];
  var submitted = false, done = false;
  function go() { if (done) return; done = true; window.location.href = 'thanks.html'; }
  f.addEventListener('submit', function () {
    submitted = true;
    if (btn) { btn.disabled = true; btn.textContent = '送信中…'; }
    setTimeout(go, 6000); // 念のためのフォールバック
  });
  sink.addEventListener('load', function () { if (submitted) setTimeout(go, 400); });
})();
</script>
</body>
</html>
